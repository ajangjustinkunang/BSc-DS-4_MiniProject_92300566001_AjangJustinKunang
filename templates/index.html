<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpamShield Mini Project</title>
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page-wrapper">
        <div class="app-card">

            <section class="form-section">
                <h2>Analyze Message</h2>
                <p>Paste the text of the message below and click analyze.</p>

                <form method="POST" class="detector-form">
                    <div class="form-group">
                        <label for="message">Message Text</label>
                        <textarea
                            id="message"
                            name="message"
                            rows="8"
                            placeholder="Type or paste your message here..."
                            
                        >{{ message }}</textarea>
                    </div>
                    <button type="submit" class="submit-button">Analyze Message</button>
                </form>

                {% if error %}
                    <div class="alert alert-error">
                        <span class="alert-icon">❌</span>
                        <div>
                            <strong>Error</strong>
                            <p>{{ error }}</p>
                        </div>
                    </div>
                {% elif result %}
                    <div class="alert {% if 'Spam' in result %}alert-warning{% else %}alert-success{% endif %}">
                        <span class="alert-icon">{% if 'Spam' in result %}⚠️{% else %}✅{% endif %}</span>
                        <div>
                            <strong>Result</strong>
                            <p>{{ result }}</p>
                        </div>
                    </div>
                {% else %}
                    <div class="info-box">
                        <p>Enter a message above and press Analyze to see the prediction.</p>
                    </div>
                {% endif %}
                </section>
    
        </div>
    </main>

    <script>
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.opacity = '1';
                setTimeout(() => {
                    alert.style.transition = 'opacity 0.3s ease';
                    alert.style.opacity = '0';
                }, 8000);
            });
        }, 500);
    </script>
</body>
</html>
